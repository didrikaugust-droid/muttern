<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Muttern Shop</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 30px;
  background:white;
  box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.menu-btn{
  font-size:26px;
  cursor:pointer;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  padding:40px;
}

.product-card{
  background:white;
  border-radius:24px;
  padding:15px;
  cursor:pointer;
  transition:.3s ease;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.product-card:hover{
  transform:translateY(-8px);
}

.image-wrap{
  overflow:hidden;
  border-radius:18px;
}

.image-wrap img{
  width:100%;
  height:220px;
  object-fit:cover;
  transition:.35s ease;
}

.product-card:hover img{
  transform:scale(1.08);
}

h3{
  text-align:center;
  margin:12px 0 0;
}
</style>
</head>

<body>

<div class="navbar">
  <h2>Muttern Shop</h2>
  <div class="menu-btn" onclick="window.location.href='menu.html'">☰</div>
</div>

<div class="grid">

  <div class="product-card" onclick="openProduct('Muttern Pro 1')">
    <div class="image-wrap">
   <img src="images/rackert1.jpg">
    </div>
    <h3>Muttern Pro 1</h3>
  </div>

  <div class="product-card" onclick="openProduct('Muttern Pro 2')">
    <div class="image-wrap">
 <img src="images/rackert2.jpg">
    </div>
    <h3>Muttern Pro 2</h3>
  </div>

  <div class="product-card" onclick="openProduct('Muttern Pro 3')">
    <div class="image-wrap">
      <img src="rackert3.jpg">
    </div>
    <h3>Muttern Pro 3</h3>
  </div>

  <div class="product-card" onclick="openProduct('Bag 1')">
    <div class="image-wrap">
      <img src="bag1.jpg">
    </div>
    <h3>Bag 1</h3>
  </div>

  <div class="product-card" onclick="openProduct('Bag 2')">
    <div class="image-wrap">
      <img src="bag2.jpg">
    </div>
    <h3>Bag 2</h3>
  </div>

</div>

<script>
function openProduct(name){
  window.location.href = "produkt.html?name=" + encodeURIComponent(name);
}
</script>

</body>
</html>
