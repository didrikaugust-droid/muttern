<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muttern Refresh</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>

    <div class="logo">
        MUTTERN
    </div>

    <div class="menu">
        MENU
    </div>

</header>

<section class="hero">

    <div class="bg"></div>

    <img src="images/lemon.png" class="fruit lemon1" alt="">
    <img src="images/lemon.png" class="fruit lemon2" alt="">

    <div class="left">

        <h1>
            Muttern<br>
            Refresh.
        </h1>

        <p>
            Den friskeste smaken<br>
            for sommeren.
        </p>

        <a href="#" class="cta">
            UTFORSK SMAKER
        </a>

    </div>

    <div class="right">

        <img
        src="images/muttern-bottle.png"
        class="bottle"
        alt="Muttern">

    </div>

</section>

<section class="yellow-section">

    <div class="sun"></div>

    <div class="yellow-content">

        <div class="bottles">

            <img src="images/bottle1.png" alt="">
            <img src="images/bottle2.png" alt="">
            <img src="images/bottle3.png" alt="">
            <img src="images/bottle4.png" alt="">
            <img src="images/bottle5.png" alt="">

        </div>

        <div class="text">

            <h2>
                Null sukker.<br>
                <span>100% smak.</span>
            </h2>

            <p>
                Opplev den nye Muttern-serien
                med maksimal smak og minimal sukker.
            </p>

            <a href="#">
                Se smaker
            </a>

        </div>

    </div>

</section>

</body>
</html>
